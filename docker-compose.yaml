services:
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:5173"
    volumes:
      - ./ui:/home/app
      - ui-node-modules:/home/app/node_modules
    env_file:
      - ./ui/.env
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    command: >
      sh -c "npm run dev -- --host 0.0.0.0"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://admin:admin123@postgres:5432/wiki}
      OAUTH_NAME_APPLICATION_ID: ${OAUTH_NAME_APPLICATION_ID:-change-me}
      OAUTH_NAME_SECRET_KEY: ${OAUTH_NAME_SECRET_KEY:-change-me}
      TOKEN_TTL_SECONDS: ${TOKEN_TTL_SECONDS:-86400}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:16
    volumes:
      - psql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: wiki
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d wiki" ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123

      PGADMIN_SETUP_SERVER_GROUP: Docker_Servers
      PGADMIN_SETUP_SERVER_NAME: Postgres_DB
      PGADMIN_SETUP_SERVER_HOST: postgres
      PGADMIN_SETUP_SERVER_PORT: 5432
      PGADMIN_SETUP_SERVER_USERNAME: admin
      PGADMIN_SETUP_SERVER_PASSWORD: admin123
      PGADMIN_SETUP_SERVER_DB: wiki
      PGADMIN_SETUP_SERVER_SSLMODE: disable
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  proxy:
    container_name: proxy
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - 80:80
      - 443:443
    restart: always

volumes:
  psql-data:
  pgadmin-data:
  ui-node-modules:
