# Self-contained reverse proxy for the containerized E2E run.
#
# Routes by compose SERVICE NAMES on the internal network, so it needs no
# host-gateway and no published host ports, and serves the UI and the API on ONE
# origin (http://notebook.com) → same-origin, no CORS for the browser.
#
# Upstreams are resolved PER REQUEST via Docker's embedded DNS (127.0.0.11) by
# using variables in proxy_pass. This makes nginx tolerant of startup order: if
# `frontend`/`api` aren't up yet it returns 502 (the runner's readiness poll just
# retries) instead of failing to boot — which a static `upstream {}` block does.
worker_processes 1;
events { worker_connections 1024; }

http {
  include       mime.types;
  sendfile      on;

  server {
    listen 80;
    server_name notebook.com;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend first: same-origin /api/v1/* → FastAPI. The UI's default
    # VITE_API_BASE_URL=/api/v1 then "just works" with no CORS.
    location /api/ {
      set $api_upstream http://api:8000;
      proxy_pass $api_upstream;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → the Vite dev server (UI). WebSocket upgrade keeps HMR
    # from erroring; tests don't depend on it.
    location / {
      set $ui_upstream http://frontend:5173;
      proxy_pass $ui_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host       $host;

      # Cross-origin isolation so SharedArrayBuffer (the notebook runtime's
      # Stop/interrupt) works. Vite already sets these; hide its copies so the
      # response carries a single valid value (mirrors the shared dev proxy).
      proxy_hide_header Cross-Origin-Opener-Policy;
      proxy_hide_header Cross-Origin-Embedder-Policy;
      add_header Cross-Origin-Opener-Policy   same-origin   always;
      add_header Cross-Origin-Embedder-Policy require-corp  always;
    }
  }
}
