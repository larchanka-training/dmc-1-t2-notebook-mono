[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra -q
markers =
    smoke: PR-blocking smoke checks
    regression: nightly regression checks
    auth: authentication / OTP / JWT
    notebooks: notebooks CRUD + sync
    ai_context: AI context sub-resource
    llm: LLM generate endpoint (contract/validation only — no real Bedrock)
    blocked: documents a known limitation (sharing not implemented, etc.)
