name: Infra — Bootstrap Terraform state

# One-time (idempotent) setup of the S3 bucket for Terraform state.
# No DynamoDB — Terraform 1.10+ does native locking right in S3
# (use_lockfile = true). See terraform/bootstrap/README.md.
#
# Trigger: workflow_dispatch only (a button in the UI). The bucket is created
# once; re-running is idempotent. No auto-triggers, on purpose.

on:
  workflow_dispatch:

concurrency:
  group: infra-bootstrap
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # Bucket name is hardcoded: it must match backend.tf in every Terraform stack
  # (terraform/cloud, terraform/preview-cloud, …). Change only in sync with them.
  BUCKET: dmc-1-t2-notebook-terraform-state

jobs:
  bootstrap:
    name: Create S3 state bucket
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run bootstrap script
        run: |
          chmod +x terraform/bootstrap/create-state-bucket.sh
          terraform/bootstrap/create-state-bucket.sh

      - name: Summary
        run: |
          {
            echo "## Terraform state bucket"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Bucket | ${BUCKET} |"
            echo "| Region | ${AWS_REGION} |"
            echo "| Locking | S3 native (use_lockfile=true), no DynamoDB |"
            echo
            echo "Next: dispatch \`Infra — Cloud stack (Terraform)\` (apply) for prod, and \`Infra — Preview-cloud stack (Terraform)\` (apply) for preview-v2 — both use this bucket (separate state keys)."
          } >> "${GITHUB_STEP_SUMMARY}"
