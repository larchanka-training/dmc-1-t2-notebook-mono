services:
  frontend:
    image: ghcr.io/larchanka-training/js-notebook-ui:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  api:
    image: ghcr.io/larchanka-training/js-notebook-api:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OAUTH_NAME_APPLICATION_ID: ${OAUTH_NAME_APPLICATION_ID}
      OAUTH_NAME_SECRET_KEY: ${OAUTH_NAME_SECRET_KEY}
      TOKEN_TTL_SECONDS: ${TOKEN_TTL_SECONDS:-86400}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - psql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy

volumes:
  psql-data:
