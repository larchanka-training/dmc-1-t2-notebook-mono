upstream frontend {
    server frontend:80;
}

upstream api {
    server api:8000;
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    # Cloudflare Origin Certificate (covers jsnb.org + *.jsnb.org, 15 years).
    # The cert file is NOT committed — place it on the server at proxy/certs/origin.pem
    # and proxy/certs/origin.key (chmod 600 the key). See docs/ci-cd.md.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    server_name _;

    location = /api/v1 {
        proxy_pass http://api;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        proxy_pass http://api;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cross-origin isolation: required for SharedArrayBuffer, which the
        # notebook runtime uses to interrupt a blocked QuickJS VM on Stop
        # without losing shared scope. Frontend assets and the API are
        # same-origin, so require-corp does not block them. If a cross-origin
        # resource is ever added it must send CORP/CORS.
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
    }
}
