name: Build & Push Images

# Reusable workflow (workflow_call): builds api + ui + migrations images and
# pushes them to GitHub Container Registry (GHCR). Called from ghcr-publish.yml
# on push to main / tag v*.*.* for prod images.
#
# Replaced the previous ECR-based build (archived in archive/aws-workflows/).
#
# Tags produced per caller event:
#   push main    → api-/ui-/migrations-latest  +  api-/ui-/migrations-sha-<short>
#   tag v*.*.*   → semver tags
#   pull_request → api-/ui-/migrations-pr-<N>  (mutable, overwritten on each push)

on:
  workflow_call:

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jsnotes-t2

jobs:
  build:
    name: Publish ${{ matrix.service }} image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./api
            target: runtime
            tag-prefix: api-
            cache-scope: ghcr-api
          - service: ui
            context: ./ui
            target: production
            tag-prefix: ui-
            cache-scope: ghcr-ui
          - service: migrations
            context: ./api/liquibase
            target: ""
            tag-prefix: migrations-
            cache-scope: ghcr-migrations

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=${{ matrix.tag-prefix }}sha-,format=short
            type=raw,value=${{ matrix.tag-prefix }}latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ matrix.tag-prefix }}pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}},prefix=${{ matrix.tag-prefix }}
            type=semver,pattern={{major}}.{{minor}},prefix=${{ matrix.tag-prefix }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          provenance: false
