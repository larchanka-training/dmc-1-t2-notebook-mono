name: Build & Push Images

# Reusable workflow (workflow_call): собирает api+ui и пушит в Amazon ECR.
# Единственный источник логики сборки — вызывается из:
#   - ecr-publish.yml  (push main / тег v*.*.*)  → prod-образы
#   - preview.yml      (pull_request)            → preview-образы pr-<N>
#
# Теги выбираются metadata-action ПО СОБЫТИЮ вызывающего workflow:
#   push main    → api-/ui-latest + api-/ui-sha-<short>
#   тег v*.*.*   → semver-теги
#   pull_request → api-/ui-pr-<N>  (MUTABLE-репо: перезаписывается на каждый push в PR)

on:
  workflow_call:

permissions:
  contents: read

env:
  # Имя ECR-репозитория захардкожено по инструкции курса:
  # vars.AWS_REPO_NAME содержит generic "jsnotes" без суффикса команды (t2).
  ECR_REPOSITORY: jsnotes-t2

jobs:
  build:
    name: Publish ${{ matrix.service }} image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./api
            target: runtime
            tag-prefix: api-
            cache-scope: ecr-api
          - service: ui
            context: ./ui
            target: production
            tag-prefix: ui-
            cache-scope: ecr-ui

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      # QEMU не нужен: собираем только под нативную для раннера amd64.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          # Префикс api-/ui- задаём per-tag (flavor.prefix в matrix оказался
          # ненадёжным). Тег pr-<N> включается только на pull_request.
          tags: |
            type=sha,prefix=${{ matrix.tag-prefix }}sha-,format=short
            type=raw,value=${{ matrix.tag-prefix }}latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ matrix.tag-prefix }}pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}},prefix=${{ matrix.tag-prefix }}
            type=semver,pattern={{major}}.{{minor}},prefix=${{ matrix.tag-prefix }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          # provenance отключён: иначе в ECR появляются untagged
          # attestation-манифесты, а образ становится index даже для одной арки.
          provenance: false
