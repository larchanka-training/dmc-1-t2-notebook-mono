name: Build & Push Images

# Reusable workflow (workflow_call): builds api + ui + migrations and pushes them
# to Amazon ECR. The single source of build logic — called from ecr-publish.yml
# (push main / tag v*.*.*) for prod images.
#
# Tags are chosen by metadata-action BY the caller's EVENT:
#   push main    → api-/ui-latest + api-/ui-sha-<short>
#   tag v*.*.*   → semver tags
#   pull_request → api-/ui-pr-<N>  (mutable repo: overwritten on each push to the PR)

on:
  workflow_call:

permissions:
  contents: read

env:
  # ECR repository name is hardcoded per the course setup (single shared repo,
  # images distinguished by tag prefix api-/ui-/migrations-).
  ECR_REPOSITORY: jsnotes-t2

jobs:
  build:
    name: Publish ${{ matrix.service }} image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./api
            target: runtime
            tag-prefix: api-
            cache-scope: ecr-api
          - service: ui
            context: ./ui
            target: production
            tag-prefix: ui-
            cache-scope: ecr-ui
          # Liquibase migration runner (changelogs baked into liquibase/liquibase).
          # Single-stage Dockerfile -> no build target. Run as a one-off ECS task
          # in deploy-cloud.yml before the API rolls out.
          - service: migrations
            context: ./api/liquibase
            target: ""
            tag-prefix: migrations-
            cache-scope: ecr-migrations

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      # No QEMU: we build only for the runner-native amd64.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          # The api-/ui- prefix is set per-tag (matrix flavor.prefix proved
          # unreliable). The pr-<N> tag is enabled only on pull_request.
          tags: |
            type=sha,prefix=${{ matrix.tag-prefix }}sha-,format=short
            type=raw,value=${{ matrix.tag-prefix }}latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ matrix.tag-prefix }}pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=semver,pattern={{version}},prefix=${{ matrix.tag-prefix }}
            type=semver,pattern={{major}}.{{minor}},prefix=${{ matrix.tag-prefix }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          # provenance disabled: otherwise ECR gets untagged attestation
          # manifests and the image becomes an index even for a single arch.
          provenance: false
