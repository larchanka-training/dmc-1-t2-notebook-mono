name: Infra — Preview-cloud stack (Terraform)

# Terraform for the preview-v2 shared layer (terraform/preview-cloud: own VPC +
# ECS/ALB/RDS/S3/CloudFront + shared main-api). Companion to infra-cloud.yml (the
# prod cloud stack); the legacy EC2 workflows have been removed. Persistent,
# applied once; per-PR slices are created imperatively from the ui/api repos'
# preview.yml.
#
# Flow: PR -> plan (read-only review gate); merge to main -> auto-apply (same
# paths); workflow_dispatch -> manual plan/apply (+ allow_destroy). A real
# destructive-change guard (parses terraform show -json) protects every path:
# a delete/replace blocks the auto-apply and requires a manual dispatch with
# allow_destroy=true.
#
# Why apply on merge, not on PR open: this is the SHARED preview layer (one VPC/
# ALB/RDS that every per-PR preview sits on). Applying from an unmerged PR would
# let one bad PR break everyone's preview, so apply waits for review + merge.

on:
  push:
    branches: [main]
    paths:
      - "terraform/preview-cloud/**"
      - "terraform/modules/preview-shared/**"
      - "terraform/modules/network/**"
      - ".github/workflows/infra-preview-cloud.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/preview-cloud/**"
      - "terraform/modules/preview-shared/**"
      - "terraform/modules/network/**"
      - ".github/workflows/infra-preview-cloud.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      allow_destroy:
        description: "Allow delete/replace in the plan (apply only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: infra-preview-cloud
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write # post the plan as a PR comment

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # On-demand DB-access bastion (SSM port-forwarding for pgAdmin). Off unless the
  # repo variable CREATE_BASTION_PREVIEW is "true". Set it true + run this workflow
  # (apply) to bring the bastion up; set it back to false and run apply with
  # allow_destroy=true to tear it down (destroy is gated by the destructive guard).
  TF_VAR_create_bastion: ${{ vars.CREATE_BASTION_PREVIEW || 'false' }}

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || (github.event_name == 'workflow_dispatch' && inputs.action) || 'plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/preview-cloud
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          set +e
          terraform plan -lock-timeout=5m -detailed-exitcode -out=tfplan
          rc=$?
          set -e
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          if [ "${rc}" -eq 1 ]; then
            echo "::error::terraform plan failed"
            exit 1
          fi
          if [ "${rc}" -eq 2 ]; then
            echo "Plan has changes."
          else
            echo "Plan is clean — apply would be a no-op."
          fi

      # aws_ecs_task_definition is excluded: it is immutable, so every image/env
      # change registers a NEW revision that Terraform models as delete+create —
      # a benign, expected replacement, not a destructive change. See infra-cloud.yml.
      - name: Guard against destructive changes
        run: |
          set -euo pipefail
          deletes=$(terraform show -json tfplan \
            | jq '[.resource_changes[]?
                   | select(.change.actions | index("delete"))
                   | select(.type != "aws_ecs_task_definition")] | length')
          echo "Destructive resources in plan (excluding ECS task-def revisions): ${deletes}"
          if [ "${deletes}" -gt 0 ]; then
            terraform show -json tfplan \
              | jq -r '.resource_changes[]?
                       | select(.change.actions | index("delete"))
                       | select(.type != "aws_ecs_task_definition")
                       | "  - \(.address) [\(.change.actions | join(","))]"'
            if [ "${{ github.event_name == 'workflow_dispatch' && inputs.allow_destroy }}" = "true" ]; then
              echo "::warning::Plan is destructive but allow_destroy=true — proceeding."
            else
              echo "::error::Plan would delete/replace resources. Re-run dispatch with allow_destroy=true if intended."
              exit 1
            fi
          fi

      # Post the plan as a sticky PR comment so reviewers see the REAL plan
      # (against live state), not just the code diff. PR event only; runs even if
      # the guard failed (always()). No new action dependency — uses the gh CLI.
      - name: Comment plan on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          terraform show -no-color tfplan > plan.txt 2>/dev/null \
            || echo "(plan unavailable — see the workflow run log)" > plan.txt
          MAX=60000
          if [ "$(wc -c < plan.txt)" -gt "${MAX}" ]; then
            head -c "${MAX}" plan.txt > plan.trunc
            printf '\n... (truncated — see the workflow run log for the full plan)\n' >> plan.trunc
            mv plan.trunc plan.txt
          fi
          MARKER="<!-- tf-plan:preview-cloud -->"
          {
            echo "${MARKER}"
            echo "### Terraform plan — preview shared layer (\`terraform/preview-cloud\`)"
            echo ""
            echo "Plan exit code: \`${{ steps.plan.outputs.exit_code }}\` — 0 = no changes, 2 = changes. On merge to \`main\` this plan is auto-applied (destructive changes are blocked by the guard)."
            echo ""
            echo "<details><summary>Show plan</summary>"
            echo ""
            echo '```terraform'
            cat plan.txt
            echo '```'
            echo ""
            echo "</details>"
          } > comment.md
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          CID=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n1)
          if [ -n "${CID}" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${CID}" -F body=@comment.md >/dev/null
            echo "Updated plan comment ${CID}"
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -F body=@comment.md >/dev/null
            echo "Created plan comment"
          fi

      # Auto-apply on merge to main (push); manual apply via dispatch. In both
      # cases the destructive guard above has already passed (it exits non-zero
      # for delete/replace unless allow_destroy=true on a dispatch run).
      - name: Terraform apply
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      # Write-once init of the main-api auth secrets — prod parity (see
      # infra-cloud.yml for the rationale). Generates a random value for any
      # EMPTY container; never overwrites an existing value.
      - name: Init auth secrets (write-once)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
        run: |
          set -euo pipefail
          for s in jwt-secret otp-hash-secret; do
            SID="jsnotes-t2-preview-${s}"
            if aws secretsmanager get-secret-value --secret-id "${SID}" >/dev/null 2>&1; then
              echo "${SID}: value already set — leaving as is."
            else
              aws secretsmanager put-secret-value --secret-id "${SID}" \
                --secret-string "$(openssl rand -base64 48 | tr -d '\n')" >/dev/null
              echo "${SID}: initialized with a generated value."
            fi
          done

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Preview-cloud stack — ${{ github.event_name == 'push' && 'apply' || (github.event_name == 'workflow_dispatch' && inputs.action) || 'plan' }}"
            echo
            echo "- Plan exit code: ${{ steps.plan.outputs.exit_code }} (0=no changes, 2=changes)"
            echo "- Working dir: terraform/preview-cloud"
          } >> "${GITHUB_STEP_SUMMARY}"
