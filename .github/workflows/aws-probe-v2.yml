name: AWS Probe v2 — teardown lifecycle (throwaway)

# ВРЕМЕННЫЙ воркфлоу: выясняет права, которые probe v1 не смог (фейковые ID
# отбраковывались как malformed раньше проверки прав):
#   ec2:CreateTags, ec2:AuthorizeSecurityGroupIngress,
#   ec2:TerminateInstances, ec2:DeleteSecurityGroup.
# Заодно валидирует механику tag-based preview end-to-end (создать → снести).
#
# Проверка идёт на РЕАЛЬНЫХ ресурсах: создаём SG + t3.micro, тестируем dry-run на
# их настоящих ID, затем РЕАЛЬНО terminate + delete-SG (это и есть уборка).
#
# Предохранители от «сироты», если terminate запрещён:
#   - --instance-initiated-shutdown-behavior terminate + user-data backstop
#     (sleep 600; shutdown) → инстанс САМ себя удалит ~через 10 мин, даже если
#     наш API terminate запрещён;
#   - уборка в if: always() + concurrency cancel-in-progress: false;
#   - SG без открытых портов (authorize только dry-run) → нулевая экспозиция.
#
# Запуск: push в ci/aws-deploy. Результат: таблица ALLOWED/DENIED в Summary.
# После прогона файл УДАЛИТЬ (вместе с probe v1).

on:
  # ВРЕМЕННО (тест на ветке без merge в main): push запускает probe v2.
  push:
    branches: [ci/aws-deploy]
  workflow_dispatch:

concurrency:
  # Не отменять на середине жизненного цикла — иначе инстанс «утечёт».
  group: aws-probe-v2
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  SG_NAME: jsnotes-probe-v2-${{ github.run_id }}

jobs:
  probe:
    name: Probe teardown lifecycle
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I
        run: aws sts get-caller-identity

      - name: Init results table
        run: |
          set +e
          {
            echo "| Capability | Result |"
            echo "| --- | --- |"
          } > probe-results.md

      - name: Resolve default VPC / subnet / AMI
        id: lookup
        run: |
          set -euo pipefail
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" \
            --query 'Vpcs[0].VpcId' --output text)
          SUBNET_ID=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query 'Subnets[0].SubnetId' --output text)
          AMI_ID=$(aws ec2 describe-images --owners 099720109477 \
            --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
                      "Name=state,Values=available" \
            --query 'sort_by(Images,&CreationDate)[-1].ImageId' --output text)
          echo "VPC=${VPC_ID} SUBNET=${SUBNET_ID} AMI=${AMI_ID}"
          echo "vpc_id=${VPC_ID}"   >> "${GITHUB_OUTPUT}"
          echo "subnet_id=${SUBNET_ID}" >> "${GITHUB_OUTPUT}"
          echo "ami_id=${AMI_ID}"   >> "${GITHUB_OUTPUT}"

      - name: Create security group (no ingress)
        id: sg
        env:
          VPC_ID: ${{ steps.lookup.outputs.vpc_id }}
        run: |
          set -euo pipefail
          SG_ID=$(aws ec2 create-security-group \
            --group-name "${SG_NAME}" --vpc-id "${VPC_ID}" \
            --description "jsnotes probe v2 (throwaway)" \
            --query 'GroupId' --output text)
          echo "SG_ID=${SG_ID}"
          # Сразу в GITHUB_ENV — чтобы уборка в always() видела ID даже при сбое ниже.
          echo "SG_ID=${SG_ID}" >> "${GITHUB_ENV}"
          echo "| ec2:CreateSecurityGroup (real) | ALLOWED |" >> probe-results.md

      - name: Probe — ec2:CreateTags (real, on SG)
        run: |
          set +e
          OUT=$(aws ec2 create-tags --resources "${SG_ID}" \
            --tags Key=project,Value=jsnotes-t2 Key=role,Value=probe-v2 Key=pr,Value=probe 2>&1)
          if [ $? -eq 0 ]; then
            echo "| ec2:CreateTags (real) | ALLOWED |" >> probe-results.md
          else
            echo "$OUT"
            echo "| ec2:CreateTags (real) | DENIED |" >> probe-results.md
          fi

      - name: Probe — ec2:AuthorizeSecurityGroupIngress (dry-run, no exposure)
        run: |
          set +e
          OUT=$(aws ec2 authorize-security-group-ingress --dry-run \
            --group-id "${SG_ID}" --protocol tcp --port 80 --cidr 0.0.0.0/0 2>&1)
          if printf '%s' "$OUT" | grep -q 'DryRunOperation'; then
            echo "| ec2:AuthorizeSecurityGroupIngress (dry-run) | ALLOWED |" >> probe-results.md
          elif printf '%s' "$OUT" | grep -q 'UnauthorizedOperation'; then
            echo "| ec2:AuthorizeSecurityGroupIngress (dry-run) | DENIED |" >> probe-results.md
          else
            echo "$OUT"
            echo "| ec2:AuthorizeSecurityGroupIngress (dry-run) | UNKNOWN |" >> probe-results.md
          fi

      - name: Build self-terminate user-data (backstop)
        run: |
          set -euo pipefail
          # Backstop: если наш API terminate запрещён — инстанс сам выключится,
          # а instance-initiated-shutdown-behavior=terminate его удалит.
          cat > userdata.sh <<'EOF'
          #!/bin/bash
          sleep 600
          shutdown -h now
          EOF
          echo "user-data готов"

      - name: Run throwaway instance (self-terminating)
        id: run
        env:
          AMI_ID: ${{ steps.lookup.outputs.ami_id }}
          SUBNET_ID: ${{ steps.lookup.outputs.subnet_id }}
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "${AMI_ID}" \
            --instance-type t3.micro \
            --security-group-ids "${SG_ID}" \
            --subnet-id "${SUBNET_ID}" \
            --instance-initiated-shutdown-behavior terminate \
            --user-data file://userdata.sh \
            --query 'Instances[0].InstanceId' --output text)
          echo "INSTANCE_ID=${INSTANCE_ID}"
          # Сразу в GITHUB_ENV — критично для уборки в always().
          echo "INSTANCE_ID=${INSTANCE_ID}" >> "${GITHUB_ENV}"
          echo "| ec2:RunInstances (real) | ALLOWED |" >> probe-results.md
          # Тег best-effort (для находимости), на уборку не влияет.
          aws ec2 create-tags --resources "${INSTANCE_ID}" \
            --tags Key=project,Value=jsnotes-t2 Key=role,Value=probe-v2 Key=pr,Value=probe >/dev/null 2>&1 || true
          aws ec2 wait instance-running --instance-ids "${INSTANCE_ID}"

      - name: Probe — terminate / delete-SG (dry-run on REAL ids)
        run: |
          set +e
          OUT=$(aws ec2 terminate-instances --dry-run --instance-ids "${INSTANCE_ID}" 2>&1)
          if printf '%s' "$OUT" | grep -q 'DryRunOperation'; then
            echo "| ec2:TerminateInstances (dry-run) | ALLOWED |" >> probe-results.md
          elif printf '%s' "$OUT" | grep -q 'UnauthorizedOperation'; then
            echo "| ec2:TerminateInstances (dry-run) | DENIED |" >> probe-results.md
          else
            echo "$OUT"; echo "| ec2:TerminateInstances (dry-run) | UNKNOWN |" >> probe-results.md
          fi
          OUT=$(aws ec2 delete-security-group --dry-run --group-id "${SG_ID}" 2>&1)
          if printf '%s' "$OUT" | grep -q 'DryRunOperation'; then
            echo "| ec2:DeleteSecurityGroup (dry-run) | ALLOWED |" >> probe-results.md
          elif printf '%s' "$OUT" | grep -q 'UnauthorizedOperation'; then
            echo "| ec2:DeleteSecurityGroup (dry-run) | DENIED |" >> probe-results.md
          else
            echo "$OUT"; echo "| ec2:DeleteSecurityGroup (dry-run) | UNKNOWN |" >> probe-results.md
          fi

      - name: Cleanup — REAL terminate + delete-SG (authoritative)
        if: always()
        run: |
          set +e
          # Это и уборка, и авторитетная проверка прав (real, не dry-run).
          if [ -n "${INSTANCE_ID:-}" ]; then
            OUT=$(aws ec2 terminate-instances --instance-ids "${INSTANCE_ID}" 2>&1)
            if [ $? -eq 0 ]; then
              echo "| ec2:TerminateInstances (REAL) | ALLOWED |" >> probe-results.md
              aws ec2 wait instance-terminated --instance-ids "${INSTANCE_ID}" 2>/dev/null
            else
              echo "$OUT"
              echo "| ec2:TerminateInstances (REAL) | DENIED |" >> probe-results.md
              echo "::error::НЕ удалось terminate ${INSTANCE_ID}. Backstop (self-shutdown ~10мин) должен добить. Проверь в консоли!"
              aws ec2 stop-instances --instance-ids "${INSTANCE_ID}" 2>&1 | head -3
            fi
          fi
          if [ -n "${SG_ID:-}" ]; then
            ok=""
            # SG удаляется только после полного terminate инстанса (ENI отвязывается с лагом).
            for i in $(seq 1 6); do
              OUT=$(aws ec2 delete-security-group --group-id "${SG_ID}" 2>&1)
              if [ $? -eq 0 ]; then ok="yes"; break; fi
              if printf '%s' "$OUT" | grep -q 'UnauthorizedOperation\|not authorized'; then
                echo "$OUT"; break
              fi
              echo "delete-SG попытка ${i}/6 не прошла (возможно ещё attached), жду..."; sleep 10
            done
            if [ -n "${ok}" ]; then
              echo "| ec2:DeleteSecurityGroup (REAL) | ALLOWED |" >> probe-results.md
            else
              echo "$OUT"
              echo "| ec2:DeleteSecurityGroup (REAL) | DENIED-or-INUSE |" >> probe-results.md
              echo "::warning::SG ${SG_ID} не удалён — проверь в консоли вручную."
            fi
          fi

      - name: Summary
        if: always()
        run: |
          set +e
          {
            echo "## AWS probe v2 — teardown lifecycle"
            echo
            cat probe-results.md 2>/dev/null || echo "(нет результатов)"
            echo
            echo "Throwaway-инстанс: \`${INSTANCE_ID:-—}\`, SG: \`${SG_ID:-—}\`"
            echo
            echo "### Вывод"
            echo "- Если **TerminateInstances + DeleteSecurityGroup + CreateTags = ALLOWED** → tag-based preview можно делать (есть чем создавать и сносить)."
            echo "- Если **TerminateInstances = DENIED** → preview-на-тегах НЕ делаем (нечем убирать) → эскалация админу."
            echo "- Если строки REAL = DENIED, но инстанс остался — его добьёт backstop self-shutdown (~10 мин) или прибей вручную по ID выше."
          } >> "${GITHUB_STEP_SUMMARY}"
