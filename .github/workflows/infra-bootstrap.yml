name: Infra — Bootstrap Terraform state

# Разовая (idempotent) подготовка S3-бакета под Terraform state.
# DynamoDB не нужен — Terraform 1.10+ умеет native locking прямо в S3
# (use_lockfile = true). См. terraform/bootstrap/README.md.
#
# Запуск: только workflow_dispatch (кнопка в UI). Бакет создаётся один раз;
# повторный прогон идемпотентен. Авто-триггеров нет намеренно.

on:
  workflow_dispatch:

concurrency:
  group: infra-bootstrap
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # Имя бакета захардкожено: должно совпадать с backend.tf в terraform/prod
  # и terraform/preview. Менять только синхронно с этими файлами.
  BUCKET: dmc-1-t2-notebook-terraform-state

jobs:
  bootstrap:
    name: Create S3 state bucket
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run bootstrap script
        run: |
          chmod +x terraform/bootstrap/create-state-bucket.sh
          terraform/bootstrap/create-state-bucket.sh

      - name: Summary
        run: |
          {
            echo "## Terraform state bucket"
            echo
            echo "| Поле | Значение |"
            echo "| --- | --- |"
            echo "| Bucket | ${BUCKET} |"
            echo "| Region | ${AWS_REGION} |"
            echo "| Locking | S3 native (use_lockfile=true), DynamoDB не используется |"
            echo
            echo "Дальше: запусти \`Infra — Provision prod host (Terraform)\` или"
            echo "открой PR — preview сам выполнит \`terraform apply\`."
          } >> "${GITHUB_STEP_SUMMARY}"
