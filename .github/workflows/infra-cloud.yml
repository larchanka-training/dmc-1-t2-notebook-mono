name: Infra — Cloud stack (Terraform)

# Terraform for the cloud-native stack (terraform/cloud: VPC/ECS/RDS/CloudFront).
# This is the prod IaC; the legacy EC2 stack and its workflows have been fully
# decommissioned and removed.
#
# Triggers:
#   - pull_request touching the cloud stack -> init + validate + plan (read-only),
#     and the plan is posted as a sticky PR comment for review.
#   - push to main (merge) -> auto-apply. The human gate is the PR itself: main
#     requires reviewer approvals to merge, and the reviewers see the real plan in
#     the PR comment — so no separate environment approval gate is needed.
#   - workflow_dispatch -> choose plan or apply (+ allow_destroy) for manual runs.
#
# Destructive-change guard: apply (auto or manual) is blocked if the plan would
# delete or replace any resource, unless `allow_destroy=true` is passed on a
# manual dispatch. This is a real guard (parses `terraform show -json`), not just
# `-detailed-exitcode`, and it re-runs at apply time — so drift between PR and
# merge can't sneak a destructive change through.

on:
  # Merge to main -> auto-apply (gated by the PR's required approvals + the plan
  # the reviewers saw in the PR comment; the destructive guard still protects it).
  push:
    branches: [main]
    paths:
      - "terraform/cloud/**"
      - "terraform/modules/network/**"
      - "terraform/modules/backend/**"
      - "terraform/modules/frontend/**"
      - "terraform/modules/data/**"
      - ".github/workflows/infra-cloud.yml"
  pull_request:
    branches: [main]
    paths:
      # The cloud stack composes ALL of these modules — each must trigger the
      # plan gate, or a change to ECS/ALB/RDS/CloudFront could land unplanned.
      - "terraform/cloud/**"
      - "terraform/modules/network/**"
      - "terraform/modules/backend/**"
      - "terraform/modules/frontend/**"
      - "terraform/modules/data/**"
      - ".github/workflows/infra-cloud.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
      allow_destroy:
        description: "Allow delete/replace in the plan (apply only)"
        required: false
        default: false
        type: boolean

concurrency:
  group: infra-cloud
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write # post the plan as a PR comment

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # Custom-domain TLS for prod CloudFront. Empty string when the GitHub
  # variable is unset → falls back to the default *.cloudfront.net cert.
  # FRONTEND_ALIASES is a JSON-encoded list (e.g. ["jsnb.org","www.jsnb.org"])
  # because Terraform parses TF_VAR for list types as JSON.
  TF_VAR_frontend_acm_certificate_arn: ${{ vars.FRONTEND_ACM_CERTIFICATE_ARN }}
  TF_VAR_frontend_aliases: ${{ vars.FRONTEND_ALIASES || '[]' }}
  # Alarm notification emails — JSON-encoded list (e.g. ["a@x.com","b@y.com"]),
  # same convention as FRONTEND_ALIASES above. Set repository variable
  # ALERT_EMAILS to activate. Empty array → SNS topics are created but no
  # email subscriptions are added.
  TF_VAR_alert_emails: ${{ vars.ALERT_EMAILS || '[]' }}

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'apply' || (github.event_name == 'workflow_dispatch' && inputs.action) || 'plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/cloud
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          set +e
          terraform plan -lock-timeout=5m -detailed-exitcode -out=tfplan
          rc=$?
          set -e
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          if [ "${rc}" -eq 1 ]; then
            echo "::error::terraform plan failed"
            exit 1
          fi
          if [ "${rc}" -eq 2 ]; then
            echo "Plan has changes."
          else
            echo "Plan is clean — apply would be a no-op."
          fi

      # Real destructive-change guard: fail if the plan deletes or replaces any
      # resource, unless explicitly allowed. A delete OR a replace shows up as a
      # "delete" action in the JSON plan.
      #
      # aws_ecs_task_definition is excluded: it is immutable, so every image/env
      # change registers a NEW revision and Terraform models it as delete+create.
      # That is a benign, expected replacement — the old revision merely goes
      # INACTIVE and the running service is unaffected (the service even has
      # ignore_changes=[task_definition]). Counting it would make the guard fire
      # on every routine config/deploy change.
      - name: Guard against destructive changes
        run: |
          set -euo pipefail
          deletes=$(terraform show -json tfplan \
            | jq '[.resource_changes[]?
                   | select(.change.actions | index("delete"))
                   | select(.type != "aws_ecs_task_definition")] | length')
          echo "Destructive resources in plan (excluding ECS task-def revisions): ${deletes}"
          if [ "${deletes}" -gt 0 ]; then
            terraform show -json tfplan \
              | jq -r '.resource_changes[]?
                       | select(.change.actions | index("delete"))
                       | select(.type != "aws_ecs_task_definition")
                       | "  - \(.address) [\(.change.actions | join(","))]"'
            if [ "${{ github.event_name == 'workflow_dispatch' && inputs.allow_destroy }}" = "true" ]; then
              echo "::warning::Plan is destructive but allow_destroy=true — proceeding."
            else
              echo "::error::Plan would delete/replace resources. Re-run dispatch with allow_destroy=true if intended."
              exit 1
            fi
          fi

      # Post the plan as a sticky PR comment so the required reviewers approve the
      # REAL plan (computed against live state), not just the code diff. PR event
      # only; runs even if the guard failed (always()) so a destructive plan is
      # still visible. No new action dependency — uses the gh CLI.
      - name: Comment plan on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          terraform show -no-color tfplan > plan.txt 2>/dev/null \
            || echo "(plan unavailable — see the workflow run log)" > plan.txt
          MAX=60000
          if [ "$(wc -c < plan.txt)" -gt "${MAX}" ]; then
            head -c "${MAX}" plan.txt > plan.trunc
            printf '\n... (truncated — see the workflow run log for the full plan)\n' >> plan.trunc
            mv plan.trunc plan.txt
          fi
          MARKER="<!-- tf-plan:cloud -->"
          {
            echo "${MARKER}"
            echo "### Terraform plan — prod cloud stack (\`terraform/cloud\`)"
            echo ""
            echo "Plan exit code: \`${{ steps.plan.outputs.exit_code }}\` — 0 = no changes, 2 = changes. On merge to \`main\` this plan is auto-applied (destructive changes are blocked by the guard)."
            echo ""
            echo "<details><summary>Show plan</summary>"
            echo ""
            echo '```terraform'
            cat plan.txt
            echo '```'
            echo ""
            echo "</details>"
          } > comment.md
          PR="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          CID=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n1)
          if [ -n "${CID}" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${CID}" -F body=@comment.md >/dev/null
            echo "Updated plan comment ${CID}"
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -F body=@comment.md >/dev/null
            echo "Created plan comment"
          fi

      # Auto-apply on merge to main (push); manual apply via dispatch. In both
      # cases the destructive guard above has already passed.
      - name: Terraform apply
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      # Write-once init of the API auth secrets. Terraform creates the secret
      # CONTAINERS (no value — values in .tf/state would leak via git/S3); the
      # API is the only consumer of these values, so nobody needs to know them:
      # generate a random one for any container that has no value yet. An
      # existing value is NEVER overwritten — rotation done in AWS stays
      # authoritative, and re-runs are no-ops.
      - name: Init auth secrets (write-once)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
        run: |
          set -euo pipefail
          for s in jwt-secret otp-hash-secret; do
            SID="${{ vars.PROJECT || 'jsnotes-t2' }}-${s}"
            if aws secretsmanager get-secret-value --secret-id "${SID}" >/dev/null 2>&1; then
              echo "${SID}: value already set — leaving as is."
            else
              aws secretsmanager put-secret-value --secret-id "${SID}" \
                --secret-string "$(openssl rand -base64 48 | tr -d '\n')" >/dev/null
              echo "${SID}: initialized with a generated value."
            fi
          done

      # These are also boot-required for the production API now that OTP email
      # delivery is real. Unlike JWT/OTP hash secrets, they cannot be generated:
      # Resend must issue the API key and EMAIL_FROM must be a verified sender.
      # Values are copied into Secrets Manager write-once from GitHub secrets /
      # vars, never stored in Terraform state.
      - name: Init Resend secrets (write-once)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
        env:
          RESEND_API_KEY_VALUE: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM_VAR: ${{ vars.EMAIL_FROM }}
          EMAIL_FROM_SECRET: ${{ secrets.EMAIL_FROM }}
        run: |
          set -euo pipefail

          init_required_secret() {
            local sid="$1"
            local value="$2"
            local source_name="$3"

            if aws secretsmanager get-secret-value --secret-id "${sid}" >/dev/null 2>&1; then
              echo "${sid}: value already set; leaving as is."
              return
            fi

            if [ -z "${value}" ]; then
              echo "::error::${sid} has no value yet. Configure ${source_name} in GitHub, then rerun infra-cloud apply."
              exit 1
            fi

            aws secretsmanager put-secret-value \
              --secret-id "${sid}" \
              --secret-string "${value}" >/dev/null
            echo "${sid}: initialized from ${source_name}."
          }

          PREFIX="${{ vars.PROJECT || 'jsnotes-t2' }}"
          EMAIL_FROM_VALUE="${EMAIL_FROM_VAR:-${EMAIL_FROM_SECRET:-}}"
          init_required_secret "${PREFIX}-resend-api-key" "${RESEND_API_KEY_VALUE}" "secret RESEND_API_KEY"
          init_required_secret "${PREFIX}-email-from" "${EMAIL_FROM_VALUE}" "var/secret EMAIL_FROM"

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Cloud stack — ${{ github.event_name == 'push' && 'apply' || (github.event_name == 'workflow_dispatch' && inputs.action) || 'plan' }}"
            echo
            echo "- Plan exit code: ${{ steps.plan.outputs.exit_code }} (0=no changes, 2=changes)"
            echo "- Working dir: terraform/cloud"
          } >> "${GITHUB_STEP_SUMMARY}"
