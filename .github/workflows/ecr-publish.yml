name: ECR Publish

# Thin trigger wrapper for PROD images: on push to main and v*.*.* tags it calls
# the reusable build-images.yml (all build logic lives there).

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      # "api"/"ui" (without /**) catch a submodule pointer bump — it's a gitlink,
      # so the changed path is "api"/"ui", not "api/**"/"ui/**".
      - "api"
      - "api/**"
      - "ui"
      - "ui/**"
      - ".github/workflows/ecr-publish.yml"
      - ".github/workflows/build-images.yml"
  # Manual run — fallback (e.g. if a v*.*.* tag push didn't match the paths filter).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build & push prod images
    uses: ./.github/workflows/build-images.yml
    secrets: inherit
