name: ECR Publish

on:
  push:
    branches:
      - main
      # ВРЕМЕННО: проверка ECR-push до merge. На не-default ветке создаются
      # только *-sha-* теги (latest/semver не трогаются). Убрать после прогона.
      - ci/ecr-test
    tags:
      - "v*.*.*"
    paths:
      # "api"/"ui" (без /**) ловят bump указателя submodule — это gitlink,
      # путь меняется как "api"/"ui", а не "api/**"/"ui/**".
      - "api"
      - "api/**"
      - "ui"
      - "ui/**"
      - ".github/workflows/ecr-publish.yml"
  # Ручной запуск — фолбэк (в т.ч. если push тега v*.*.* не прошёл paths-фильтр).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Командный ECR-репозиторий (t2) на оба образа; различаем их префиксом
  # тега (api-* / ui-*). Имя захардкожено по инструкции курса:
  # vars.AWS_REPO_NAME содержит generic "jsnotes" без суффикса команды.
  ECR_REPOSITORY: jsnotes-t2

jobs:
  publish:
    name: Publish ${{ matrix.service }} image to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./api
            target: runtime
            tag-prefix: api-
            cache-scope: ecr-api
          - service: ui
            context: ./ui
            target: production
            tag-prefix: ui-
            cache-scope: ecr-ui

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout submodules
        run: |
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive

      # QEMU не нужен: собираем только под нативную для раннера amd64.
      # Если появится ARM-таргет — вернуть setup-qemu-action и arm64 в platforms.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          # flavor.prefix добавляется ко ВСЕМ тегам (включая latest при
          # onlatest=true), поэтому per-tag prefix тут не нужен — иначе
          # получили бы дубль вида "api-api-sha-...".
          flavor: |
            prefix=${{ matrix.tag-prefix }},onlatest=true
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || '/api/v1' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          # provenance отключён: иначе в ECR появляются лишние untagged
          # attestation-манифесты, а образ становится index даже для одной арки.
          provenance: false
