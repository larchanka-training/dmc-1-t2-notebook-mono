name: AWS Probe (throwaway)

# ВРЕМЕННЫЙ воркфлоу — проверяет, ЧТО умеют ключи из secrets.
# Запуск: создать ветку `aws-probe` и запушить — отработает сам.
# Ничего НЕ создаёт (только read + dry-run). После проверки — удалить файл/ветку.

on:
  push:
    branches: [aws-probe, ci/aws-deploy]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      - name: Who am I (какая IAM-личность у ключей)
        run: aws sts get-caller-identity

      - name: Permissions of the user (политики)
        run: |
          set +e
          U=$(aws sts get-caller-identity --query Arn --output text | awk -F/ '{print $NF}')
          echo "user=$U"
          echo "=== attached managed policies ==="; aws iam list-attached-user-policies --user-name "$U"
          echo "=== inline policies ===";          aws iam list-user-policies --user-name "$U"
          echo "=== groups ===";                   aws iam list-groups-for-user --user-name "$U"

      - name: Read-only probes (что можно ЧИТАТЬ)
        run: |
          set +e
          echo "=== EC2 describe-instances ===";   aws ec2 describe-instances --max-items 1
          echo "=== EC2 describe-vpcs ===";         aws ec2 describe-vpcs --max-items 1
          echo "=== S3 ls ===";                     aws s3 ls
          echo "=== IAM list-roles ===";            aws iam list-roles --max-items 1
          echo "=== ECR describe-repositories ==="; aws ecr describe-repositories --max-items 1
          echo "done"

      - name: Dry-run CREATE probes (НИЧЕГО не создаёт, проверяет право на create)
        run: |
          set +e
          echo "=== достаю РЕАЛЬНЫЙ AMI (Amazon Linux 2023) ==="
          AMI=$(aws ec2 describe-images --owners amazon \
            --filters "Name=name,Values=al2023-ami-2023*-x86_64" "Name=state,Values=available" \
            --query 'sort_by(Images,&CreationDate)[-1].ImageId' --output text 2>&1)
          echo "AMI=$AMI"
          echo "=== EC2 run-instances (dry-run) с реальным AMI ==="
          aws ec2 run-instances --dry-run --image-id "$AMI" --instance-type t3.small
          echo "=== EC2 create-security-group (dry-run) ==="
          aws ec2 create-security-group --dry-run --group-name probe-sg --description probe
          echo "done"
