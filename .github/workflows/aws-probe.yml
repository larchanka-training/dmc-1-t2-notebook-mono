name: AWS Probe — real capability check (throwaway)

# ВРЕМЕННЫЙ воркфлоу: выясняет, что РЕАЛЬНО может deploy-user (ключи из secrets).
#
# Почему «реально», а не simulate: у deploy-user нет iam:SimulatePrincipalPolicy,
# поэтому проверяем фактической попыткой create → сразу delete (уборка в том же
# шаге). EC2 terminate/delete-SG — через --dry-run (без удаления чужого).
#
# Запуск: push в ci/aws-deploy (workflow_dispatch на ветке недоступен — для него
# файл должен быть в default-ветке main). Результат: таблица ALLOWED/DENIED в
# Summary. Она решает развилку preview A/Б. После прогона файл УДАЛИТЬ (Фаза 3).

on:
  # ВРЕМЕННО (тест на ветке без merge в main): push запускает probe.
  # Перед merge в main этот блок push убрать (останется только workflow_dispatch).
  push:
    branches: [ci/aws-deploy]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}

jobs:
  probe:
    name: Probe AWS capabilities
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I
        run: aws sts get-caller-identity

      - name: Init results table
        run: |
          set +e
          {
            echo "| Capability | Result |"
            echo "| --- | --- |"
          } > probe-results.md

      - name: Probe — S3 create/put/get/delete bucket
        run: |
          set +e
          B="jsnotes-t2-probe-${GITHUB_RUN_ID}-s3"
          R="DENIED"; OBJ="—"
          if [ "${AWS_REGION}" = "us-east-1" ]; then
            OUT=$(aws s3api create-bucket --bucket "$B" --region "$AWS_REGION" 2>&1)
          else
            OUT=$(aws s3api create-bucket --bucket "$B" --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION" 2>&1)
          fi
          echo "$OUT"
          if printf '%s' "$OUT" | grep -qi 'Location\|already'; then
            R="ALLOWED"
            aws s3api put-object --bucket "$B" --key probe.txt --body probe-results.md >/dev/null 2>&1 \
              && aws s3api get-object --bucket "$B" --key probe.txt /tmp/probe.out >/dev/null 2>&1 \
              && OBJ="ALLOWED" || OBJ="DENIED"
            aws s3api delete-object --bucket "$B" --key probe.txt >/dev/null 2>&1
            aws s3api delete-bucket --bucket "$B" --region "$AWS_REGION" >/dev/null 2>&1
          fi
          echo "| S3 create-bucket | $R |" >> probe-results.md
          echo "| S3 object put/get/delete | $OBJ |" >> probe-results.md

      - name: Probe — DynamoDB create/delete table
        run: |
          set +e
          T="jsnotes-t2-probe-${GITHUB_RUN_ID}-ddb"
          R="DENIED"
          OUT=$(aws dynamodb create-table --table-name "$T" \
            --attribute-definitions AttributeName=LockID,AttributeType=S \
            --key-schema AttributeName=LockID,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST --region "$AWS_REGION" 2>&1)
          echo "$OUT"
          if printf '%s' "$OUT" | grep -qi 'TableDescription\|already exists'; then
            R="ALLOWED"
            aws dynamodb wait table-exists --table-name "$T" --region "$AWS_REGION" 2>/dev/null
            aws dynamodb delete-table --table-name "$T" --region "$AWS_REGION" >/dev/null 2>&1
          fi
          echo "| DynamoDB create/delete table | $R |" >> probe-results.md

      - name: Probe — IAM role + instance-profile create/delete
        run: |
          set +e
          ROLE="jsnotes-t2-probe-${GITHUB_RUN_ID}-role"
          PROF="jsnotes-t2-probe-${GITHUB_RUN_ID}-prof"
          R="DENIED"
          cat > trust.json <<'JSON'
          {"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ec2.amazonaws.com"},"Action":"sts:AssumeRole"}]}
          JSON
          OUT=$(aws iam create-role --role-name "$ROLE" \
            --assume-role-policy-document file://trust.json 2>&1)
          echo "$OUT"
          if printf '%s' "$OUT" | grep -qi '"Arn"\|EntityAlreadyExists'; then
            R="ALLOWED"
            aws iam create-instance-profile --instance-profile-name "$PROF" >/dev/null 2>&1
            aws iam add-role-to-instance-profile --instance-profile-name "$PROF" --role-name "$ROLE" >/dev/null 2>&1
            # уборка в обратном порядке
            aws iam remove-role-from-instance-profile --instance-profile-name "$PROF" --role-name "$ROLE" >/dev/null 2>&1
            aws iam delete-instance-profile --instance-profile-name "$PROF" >/dev/null 2>&1
            aws iam delete-role --role-name "$ROLE" >/dev/null 2>&1
          fi
          echo "| IAM create role + instance-profile | $R |" >> probe-results.md

      - name: Probe — EC2 create/terminate/delete-SG (dry-run)
        run: |
          set +e
          probe_dry () {
            # $1 = подпись, $2.. = команда
            local label="$1"; shift
            local out; out=$("$@" 2>&1)
            if printf '%s' "$out" | grep -q 'DryRunOperation'; then
              echo "| $label | ALLOWED |" >> probe-results.md
            elif printf '%s' "$out" | grep -q 'UnauthorizedOperation'; then
              echo "| $label | DENIED |" >> probe-results.md
            else
              echo "| $label | UNKNOWN ($(printf '%s' "$out" | head -1)) |" >> probe-results.md
            fi
            echo "$out"
          }
          AMI=$(aws ec2 describe-images --owners 099720109477 \
            --filters "Name=name,Values=ubuntu/images/hvm-ssd/ubuntu-jammy-22.04-amd64-server-*" \
                      "Name=state,Values=available" \
            --query 'sort_by(Images,&CreationDate)[-1].ImageId' --output text 2>/dev/null)
          echo "AMI=$AMI"
          probe_dry "EC2 run-instances"          aws ec2 run-instances --dry-run --image-id "$AMI" --instance-type t3.micro
          probe_dry "EC2 create-security-group"  aws ec2 create-security-group --dry-run --group-name probe-sg-${GITHUB_RUN_ID} --description probe
          probe_dry "EC2 terminate-instances"    aws ec2 terminate-instances --dry-run --instance-ids i-0123456789abcdef0
          probe_dry "EC2 delete-security-group"  aws ec2 delete-security-group --dry-run --group-id sg-0123456789abcdef0

      - name: Summary + развилка
        if: always()
        run: |
          set +e
          {
            echo "## AWS capability probe"
            echo
            cat probe-results.md 2>/dev/null || echo "(нет результатов — проверь шаги выше)"
            echo
            echo "### Как читать"
            echo "- **S3 create-bucket + DynamoDB ALLOWED** → preview **вариант A** (Terraform + S3 remote state)."
            echo "- иначе → preview **вариант Б** (теги, без S3)."
            echo "- **IAM ALLOWED** → preview-VM логинится в ECR через instance-profile; иначе — ключи deploy-user в user-data."
            echo "- **EC2 terminate / delete-SG** нужны для сноса preview при закрытии PR (оба варианта). Если DENIED — эскалировать админу."
            echo "- run-instances / create-security-group ожидаемо ALLOWED (нужны и проду, и preview)."
          } >> "${GITHUB_STEP_SUMMARY}"
