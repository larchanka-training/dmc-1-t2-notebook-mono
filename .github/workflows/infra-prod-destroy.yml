name: Infra — Destroy legacy (Terraform)

# Decommission the LEGACY EC2 stacks (terraform/prod, terraform/preview) that the
# cloud stack + preview-v2 replaced. Manual only (workflow_dispatch), and split
# into two jobs so a live EC2 is never torn down on one person's click:
#   1. plan    — `terraform plan -destroy -out=tfplan`; writes the human-readable
#                 plan to the step summary and uploads tfplan as an artifact.
#   2. destroy — gated on the `legacy-destroy` GitHub Environment (REQUIRED
#                 REVIEWERS — a second approver — must be configured on that
#                 environment in repo Settings → Environments) and confirm=DESTROY;
#                 applies the EXACT reviewed plan. TERMINATES the live EC2 + SG.
# Irreversible. Run only when traffic no longer depends on the legacy host.
# After a green destroy, delete terraform/{prod,preview,modules/docker_host}
# and this workflow.
#
# NOTE: terraform/preview uses per-PR workspaces (pr-<N>); this destroys only the
# selected stack's DEFAULT workspace. TF_VAR_* below are placeholders — the SSH
# key is only used at create time, so its value is irrelevant for destroy.

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Legacy stack to destroy"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - preview
      confirm:
        description: "Type DESTROY to confirm termination of the live EC2"
        required: true
        default: ""

concurrency:
  group: infra-legacy-destroy
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # Required by the legacy stacks but unused for destroy (placeholders).
  TF_VAR_ssh_public_key: "destroy-placeholder"
  TF_VAR_pr_number: "0"

jobs:
  plan:
    name: Plan destroy legacy ${{ inputs.stack || 'prod' }} (read-only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/${{ inputs.stack || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Plan destroy (read-only) -> tfplan
        run: terraform plan -destroy -lock-timeout=5m -out=tfplan

      - name: Render plan to the step summary
        run: |
          {
            echo "## Plan: destroy legacy ${{ inputs.stack || 'prod' }}"
            echo
            echo "Review the resources below before approving the \`destroy\` job."
            echo '```'
            terraform show -no-color tfplan
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload tfplan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.stack || 'prod' }}
          path: terraform/${{ inputs.stack || 'prod' }}/tfplan
          retention-days: 1
          if-no-files-found: error

  destroy:
    name: Destroy legacy ${{ inputs.stack || 'prod' }}
    needs: plan
    # Only on an explicit dispatch with confirm=DESTROY...
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm == 'DESTROY' }}
    # ...AND a second approver via the protected GitHub Environment (configure
    # required reviewers in repo Settings → Environments → legacy-destroy).
    environment: legacy-destroy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/${{ inputs.stack || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Download tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.stack || 'prod' }}
          path: terraform/${{ inputs.stack || 'prod' }}

      - name: Apply the reviewed destroy plan
        # Applies the EXACT plan reviewed in the `plan` job — TERMINATES the EC2.
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      - name: Summary
        if: ${{ always() }}
        run: |
          {
            echo "## Destroy legacy ${{ inputs.stack || 'prod' }}"
            echo
            echo "- Applied the reviewed destroy plan (live EC2 terminated)."
          } >> "${GITHUB_STEP_SUMMARY}"
