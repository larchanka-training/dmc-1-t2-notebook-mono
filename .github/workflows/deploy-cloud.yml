name: Deploy — cloud (ECS + CloudFront)

# Deploys a release to the cloud-native stack (terraform/cloud):
#   - backend: register a new ECS task-definition revision with the chosen
#     immutable image tag, update the service (rolling), wait for stable, smoke.
#   - frontend: pull the built ui image, extract the static files, sync to S3,
#     invalidate CloudFront.
#
# Separate from deploy.yml (which deploys the legacy EC2 + compose prod) — that
# one stays until cutover.
#
# On the dev branch (TEMPORARY): a push that touches api/ui or these workflows
# runs the `build` job (build-images) and then the deploy jobs (needs: build) —
# one self-contained build+deploy chain. On main this becomes
# workflow_dispatch + a workflow_run-after-"ECR Publish" auto-deploy, and the
# build job is dropped (images come from ECR Publish).
#
# NOTE: requires the cloud stack to be applied (ECS service, ALB, S3, CloudFront).

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag without the api-/ui- prefix (immutable sha-<short> for real deploys; latest for a quick test)"
        required: true
        default: "latest"
  # TEMPORARY (active AWS dev branch): auto build+deploy on push to the branch
  # when app code (api/ui) or these workflows change. The 'build' job builds the
  # images and the deploy jobs run after it (same-workflow chain) — this works
  # off-branch, unlike a workflow_run auto-deploy which needs the workflow on
  # main. At cutover: REMOVE this push trigger AND the 'build' job + `needs`, and
  # wire deploy via workflow_dispatch + workflow_run-after-ECR-Publish on main.
  push:
    branches: [feat/cloud-migration]
    paths:
      - "api"
      - "ui"
      - ".github/workflows/deploy-cloud.yml"
      - ".github/workflows/build-images.yml"

concurrency:
  group: deploy-cloud
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  ECR_REGISTRY: "867633231218.dkr.ecr.eu-north-1.amazonaws.com"
  ECR_REPOSITORY: "jsnotes-t2"
  ECS_CLUSTER: "jsnotes-t2"
  ECS_SERVICE: "jsnotes-t2-api"
  TASK_FAMILY: "jsnotes-t2-api"
  CONTAINER_NAME: "api"
  ALB_NAME: "jsnotes-t2-alb"
  MIGRATION_TASK_FAMILY: "jsnotes-t2-migrations"
  FRONTEND_BUCKET: "jsnotes-t2-frontend"
  CLOUDFRONT_COMMENT: "jsnotes-t2 frontend"

jobs:
  # TEMPORARY (dev branch): build + push api/ui/migrations images for this commit
  # so the deploy jobs below can run them. On main this is ECR Publish's job;
  # remove this and the `needs: build` at cutover.
  build:
    name: Build images
    uses: ./.github/workflows/build-images.yml
    secrets: inherit

  backend:
    name: Deploy API to ECS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"   # workflow_dispatch
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"      # push to branch
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task-definition revision
        run: |
          set -euo pipefail
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:api-${IMAGE_TAG}"
          echo "New image: ${IMAGE}"

          # Take the current task def and swap only the api container image,
          # keeping all other settings (env, secrets, roles, cpu/mem). Strip the
          # read-only fields that register-task-definition rejects.
          aws ecs describe-task-definition --task-definition "${TASK_FAMILY}" \
            --query 'taskDefinition' > td.json

          jq --arg IMG "${IMAGE}" --arg CN "${CONTAINER_NAME}" '
            .containerDefinitions |= map(if .name == $CN then .image = $IMG else . end)
            | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
               requiresCompatibilities, cpu, memory}
          ' td.json > new-td.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: ${NEW_TD_ARN}"
          echo "NEW_TD_ARN=${NEW_TD_ARN}" >> "${GITHUB_ENV}"

      - name: Run DB migrations (Liquibase)
        run: |
          set -euo pipefail
          MIG_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:migrations-${IMAGE_TAG}"
          echo "Migration image: ${MIG_IMAGE}"

          # New revision of the migration task def with this image (mirror of the
          # api register step: keep env/secrets/roles, strip read-only fields).
          aws ecs describe-task-definition --task-definition "${MIGRATION_TASK_FAMILY}" \
            --query 'taskDefinition' > mig-td.json
          jq --arg IMG "${MIG_IMAGE}" '
            .containerDefinitions |= map(if .name == "migrations" then .image = $IMG else . end)
            | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
               requiresCompatibilities, cpu, memory}
          ' mig-td.json > mig-new-td.json
          MIG_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://mig-new-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "Registered: ${MIG_TD_ARN}"

          # Reuse the API service's network config (private subnets + ECS SG), so
          # the migration task reaches RDS (rds SG allows 5432 from the ECS SG).
          NETCFG=$(aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json)
          SUBNETS=$(echo "${NETCFG}" | jq -r '.subnets | join(",")')
          SGS=$(echo "${NETCFG}" | jq -r '.securityGroups | join(",")')

          # One-off run to completion.
          TASK_ARN=$(aws ecs run-task --cluster "${ECS_CLUSTER}" --launch-type FARGATE \
            --task-definition "${MIG_TD_ARN}" \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SGS}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}"

          EXIT=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "Migration exit: ${EXIT} (${REASON})"
          if [ "${EXIT}" != "0" ]; then
            echo "::error::Liquibase migration failed (exit ${EXIT}: ${REASON}). See CloudWatch /ecs/${MIGRATION_TASK_FAMILY}."
            exit 1
          fi
          echo "Migrations applied."

      - name: Update service (rolling)
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TD_ARN}" >/dev/null
          echo "Service updated to ${NEW_TD_ARN}"

      - name: Wait for the service to stabilize
        run: aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"

      - name: Smoke test (ALB health)
        run: |
          set -euo pipefail
          ALB_DNS=$(aws elbv2 describe-load-balancers --names "${ALB_NAME}" \
            --query 'LoadBalancers[0].DNSName' --output text)
          for i in $(seq 1 10); do
            if curl -fsS "http://${ALB_DNS}/api/v1/health"; then
              echo "API healthy via ALB"; exit 0
            fi
            echo "waiting for API... ${i}/10"; sleep 6
          done
          echo "::error::API health check failed"; exit 1

  frontend:
    name: Deploy UI to S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"   # workflow_dispatch
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"      # push to branch
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Extract built static files from the ui image
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:ui-${IMAGE_TAG}"
          docker pull "${IMAGE}"
          # The ui production image serves /usr/share/nginx/html — copy it out.
          cid=$(docker create "${IMAGE}")
          docker cp "${cid}:/usr/share/nginx/html" ./site
          docker rm "${cid}" >/dev/null

      - name: Sync to S3
        run: aws s3 sync ./site "s3://${FRONTEND_BUCKET}" --delete

      - name: Invalidate CloudFront
        run: |
          set -euo pipefail
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${CLOUDFRONT_COMMENT}'].Id | [0]" \
            --output text)
          if [ -z "${DIST_ID}" ] || [ "${DIST_ID}" = "None" ]; then
            echo "::error::CloudFront distribution not found by comment '${CLOUDFRONT_COMMENT}'"; exit 1
          fi
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*" >/dev/null
          echo "Invalidated CloudFront ${DIST_ID}"
