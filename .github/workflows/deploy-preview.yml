name: Deploy — preview shared main-api

# Refreshes the preview-v2 shared backend (the stable API that per-PR UI previews
# talk to): migrate the preview_main database with contexts=dev (so the dev-seed
# populates it), then roll the main-api service. Targets the PREVIEW cluster
# (jsnotes-t2-preview), not prod.
#
# Triggers (same shape as deploy-cloud.yml):
#   - workflow_run after "ECR Publish" (on main) -> auto-refresh the shared
#     preview backend with the freshly built main images, so preview-main tracks
#     main automatically (an api merge reaches it via the monorepo pointer bump,
#     which is what builds the images).
#   - workflow_dispatch -> manual refresh / rollback to a chosen image_tag.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        # No default: an immutable sha-<short> must be typed in explicitly, so a
        # blind "Run workflow" can't ship the mutable `latest` (same rule as
        # deploy-cloud.yml).
        description: "Image tag without the api-/migrations- prefix (immutable sha-<short>; built by ECR Publish)."
        required: true
  # Auto-refresh: after "ECR Publish" succeeds on main (i.e. a submodule pointer
  # bump built fresh main images), roll the shared preview backend onto them.
  workflow_run:
    workflows: ["ECR Publish"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-preview
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  ECR_REGISTRY: "867633231218.dkr.ecr.eu-north-1.amazonaws.com"
  ECR_REPOSITORY: "jsnotes-t2"
  ECS_CLUSTER: "jsnotes-t2-preview"
  ECS_SERVICE: "jsnotes-t2-preview-main-api"
  CONTAINER_NAME: "api"
  ALB_NAME: "jsnotes-t2-preview-alb"
  DB_MASTER_SECRET: "jsnotes-t2-preview-db-master"
  MAIN_DB_NAME: "preview_main"

jobs:
  deploy:
    name: Deploy preview main-api
    # Skip auto-runs where the upstream ECR Publish didn't succeed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> "$GITHUB_ENV"            # workflow_dispatch
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            echo "IMAGE_TAG=sha-${SHA:0:7}" >> "$GITHUB_ENV"                     # workflow_run after ECR Publish
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      # Single owner of the task definition: Terraform (prod parity — see
      # deploy-cloud.yml). Releases are rendered from the Terraform-registered
      # baseline revisions, never from the live family's latest revision.
      # The retry covers only the bootstrap case (outputs not in state yet);
      # it does NOT order deploy after apply on mixed merges — that ordering
      # is the expand/contract release rule (see deploy-cloud.yml). Both
      # outputs are written atomically by one apply, so the migration read
      # below needs no retry of its own.
      - name: Read task-def baselines from Terraform state
        run: |
          set -euo pipefail
          terraform -chdir=terraform/preview-cloud init -input=false >/dev/null
          for i in $(seq 1 10); do
            BASE_TD_ARN=$(terraform -chdir=terraform/preview-cloud output -raw main_api_task_definition_arn 2>/dev/null) && break
            echo "Baseline outputs not in state yet (infra apply pending?) ${i}/10"; sleep 30
          done
          if [ -z "${BASE_TD_ARN:-}" ]; then
            echo "::error::main_api_task_definition_arn not found in Terraform state — run infra-preview-cloud.yml apply first."
            exit 1
          fi
          BASE_MIG_TD_ARN=$(terraform -chdir=terraform/preview-cloud output -raw migration_task_definition_arn)
          echo "main-api baseline:  ${BASE_TD_ARN}"
          echo "migration baseline: ${BASE_MIG_TD_ARN}"
          echo "BASE_TD_ARN=${BASE_TD_ARN}" >> "${GITHUB_ENV}"
          echo "BASE_MIG_TD_ARN=${BASE_MIG_TD_ARN}" >> "${GITHUB_ENV}"

      - name: Run DB migrations into preview_main (contexts=dev)
        run: |
          set -euo pipefail
          MIG_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:migrations-${IMAGE_TAG}"

          # New revision of the preview migration task def with this image,
          # rendered from the Terraform baseline.
          aws ecs describe-task-definition --task-definition "${BASE_MIG_TD_ARN}" \
            --query 'taskDefinition' > mig-td.json
          jq --arg IMG "${MIG_IMAGE}" '
            .containerDefinitions |= map(if .name == "migrations" then .image = $IMG else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' mig-td.json > mig-new-td.json
          MIG_TD_ARN=$(aws ecs register-task-definition --cli-input-json file://mig-new-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          # Build the JDBC URL for preview_main from the master secret's host.
          HOST=$(aws secretsmanager get-secret-value --secret-id "${DB_MASTER_SECRET}" \
            --query 'SecretString' --output text | jq -r '.host')
          DB_URL="jdbc:postgresql://${HOST}:5432/${MAIN_DB_NAME}"

          # Reuse the main-api service's network config (private subnets + ECS SG).
          NETCFG=$(aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' --output json)
          SUBNETS=$(echo "${NETCFG}" | jq -r '.subnets | join(",")')
          SGS=$(echo "${NETCFG}" | jq -r '.securityGroups | join(",")')

          # run-task, overriding the target DB URL + contexts=dev (so the dev-seed runs).
          OVERRIDES=$(jq -nc --arg url "${DB_URL}" '{containerOverrides:[{name:"migrations",environment:[
            {name:"LIQUIBASE_COMMAND_URL",value:$url},
            {name:"LIQUIBASE_COMMAND_CONTEXTS",value:"dev"}]}]}')
          TASK_ARN=$(aws ecs run-task --cluster "${ECS_CLUSTER}" --launch-type FARGATE \
            --task-definition "${MIG_TD_ARN}" \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${SGS}],assignPublicIp=DISABLED}" \
            --overrides "${OVERRIDES}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: ${TASK_ARN}"
          aws ecs wait tasks-stopped --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}"
          EXIT=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          REASON=$(aws ecs describe-tasks --cluster "${ECS_CLUSTER}" --tasks "${TASK_ARN}" \
            --query 'tasks[0].stoppedReason' --output text)
          echo "Migration exit: ${EXIT} (${REASON})"
          [ "${EXIT}" = "0" ] || { echo "::error::preview_main migration failed (exit ${EXIT}: ${REASON})"; exit 1; }

      - name: Register main-api revision + roll the service
        run: |
          set -euo pipefail
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:api-${IMAGE_TAG}"
          # Render from the Terraform baseline (single owner of env/secrets).
          aws ecs describe-task-definition --task-definition "${BASE_TD_ARN}" \
            --query 'taskDefinition' > td.json
          jq --arg IMG "${IMAGE}" --arg CN "${CONTAINER_NAME}" '
            .containerDefinitions |= map(if .name == $CN then .image = $IMG else . end)
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
          ' td.json > new-td.json
          NEW_TD_ARN=$(aws ecs register-task-definition --cli-input-json file://new-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster "${ECS_CLUSTER}" --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TD_ARN}" >/dev/null
          echo "main-api updated to ${NEW_TD_ARN}"
          echo "NEW_TD_ARN=${NEW_TD_ARN}" >> "${GITHUB_ENV}"

      - name: Wait for the service to stabilize
        run: aws ecs wait services-stable --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}"

      # Prod parity (see deploy-cloud.yml): `services-stable` also succeeds when
      # the circuit breaker rolled back — only pass if OUR revision is serving.
      - name: Verify the new revision is live (no silent rollback)
        run: |
          set -euo pipefail
          ACTIVE=$(aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" \
            --query 'services[0].taskDefinition' --output text)
          echo "Active:   ${ACTIVE}"
          echo "Expected: ${NEW_TD_ARN}"
          if [ "${ACTIVE}" != "${NEW_TD_ARN}" ]; then
            REASON=$(aws ecs describe-services --cluster "${ECS_CLUSTER}" --services "${ECS_SERVICE}" \
              --query 'services[0].events[0:5].message' --output text)
            echo "::error::Preview deployment rolled back — still on ${ACTIVE}. Recent events: ${REASON}."
            exit 1
          fi
          echo "New revision is serving."

      - name: Smoke test (preview ALB health)
        run: |
          set -euo pipefail
          ALB_DNS=$(aws elbv2 describe-load-balancers --names "${ALB_NAME}" \
            --query 'LoadBalancers[0].DNSName' --output text)
          for i in $(seq 1 10); do
            if curl -fsS "http://${ALB_DNS}/api/v1/health"; then echo "preview main-api healthy"; exit 0; fi
            echo "waiting... ${i}/10"; sleep 6
          done
          echo "::error::preview main-api health check failed"; exit 1
