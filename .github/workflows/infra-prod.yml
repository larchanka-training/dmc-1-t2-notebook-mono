name: Infra — Provision prod host (Terraform)

# Управление прод-EC2 через Terraform.
#
# Backend — S3 (dmc-1-t2-notebook-terraform-state) с native locking (use_lockfile=true,
# DynamoDB не нужен, Terraform 1.10+). Перед первым запуском должен быть
# создан state-бакет: workflow «Infra — Bootstrap Terraform state».
#
# Идемпотентность + защита уже работающего прода:
#   1) terraform init.
#   2) Если в state ещё нет aws_instance.this или aws_security_group.this,
#      ищем существующие ресурсы по имени SG (jsnotes-t2-prod-sg). Если есть —
#      делаем `terraform import`, чтобы не пересоздавать рабочий прод.
#   3) terraform plan (с -detailed-exitcode) — упасть с ошибкой, если
#      обнаружились бы destructive-изменения (rebuild EC2). Это страховка.
#   4) terraform apply.
#
# Запуск: push в ci/aws-deploy (ВРЕМЕННО, тест на ветке) или workflow_dispatch.

on:
  push:
    branches: [ci/aws-deploy]
  workflow_dispatch:

concurrency:
  group: infra-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  SG_NAME: jsnotes-t2-prod-sg
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "1"
  # Публичная половина ключа (приватная — в secret SSH_PRIVATE_KEY).
  # Хранить публичный ключ в коде безопасно.
  PROD_SSH_PUBLIC_KEY: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExNPfh1RUeMjLrKuGmcUnx6vZAcsUUuOED/aEU9jLEv jsnotes-t2-prod-deploy"

jobs:
  provision:
    name: Provision prod EC2 (terraform apply)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/prod
    env:
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'eu-north-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.5
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init

      - name: Export TF_VAR_ssh_public_key
        run: echo "TF_VAR_ssh_public_key=${PROD_SSH_PUBLIC_KEY}" >> "${GITHUB_ENV}"

      # Если в state ещё нет ресурсов, но в AWS они уже есть (создавал
      # старый CLI-based infra-prod.yml) — импортируем, чтобы Terraform
      # принял управление вместо replace.
      - name: Import existing prod (if not in state yet)
        run: |
          set -euo pipefail

          have_sg=$(terraform state list 2>/dev/null | grep -F 'module.host.aws_security_group.this' || true)
          have_ec2=$(terraform state list 2>/dev/null | grep -F 'module.host.aws_instance.this' || true)

          if [ -z "${have_sg}" ]; then
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" \
              --query 'Vpcs[0].VpcId' --output text)
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=${SG_NAME}" "Name=vpc-id,Values=${VPC_ID}" \
              --query 'SecurityGroups[0].GroupId' --output text)
            if [ -n "${SG_ID}" ] && [ "${SG_ID}" != "None" ]; then
              echo "Импортирую существующий SG ${SG_ID}"
              terraform import 'module.host.aws_security_group.this' "${SG_ID}"
            else
              echo "SG ещё не существует — будет создан apply'ем."
            fi
          else
            echo "SG уже в state — пропускаю import."
          fi

          if [ -z "${have_ec2}" ]; then
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" \
              --query 'Vpcs[0].VpcId' --output text)
            SG_ID=$(aws ec2 describe-security-groups \
              --filters "Name=group-name,Values=${SG_NAME}" "Name=vpc-id,Values=${VPC_ID}" \
              --query 'SecurityGroups[0].GroupId' --output text)
            if [ -n "${SG_ID}" ] && [ "${SG_ID}" != "None" ]; then
              EC2_ID=$(aws ec2 describe-instances \
                --filters "Name=instance.group-id,Values=${SG_ID}" \
                          "Name=instance-state-name,Values=pending,running" \
                --query 'Reservations[].Instances[0].InstanceId' --output text)
              if [ -n "${EC2_ID}" ] && [ "${EC2_ID}" != "None" ]; then
                echo "Импортирую существующий EC2 ${EC2_ID}"
                terraform import 'module.host.aws_instance.this' "${EC2_ID}"
              else
                echo "EC2 ещё не существует — будет создан apply'ем."
              fi
            fi
          else
            echo "EC2 уже в state — пропускаю import."
          fi

      - name: Terraform plan
        id: plan
        run: |
          set -euo pipefail
          # -detailed-exitcode: 0=no changes, 2=changes, 1=error. Принимаем оба,
          # но 2 фиксируем в outputs, чтобы видеть факт изменений в Summary.
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          rc=$?
          set -e
          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"
          if [ "${rc}" -eq 1 ]; then
            echo "::error::terraform plan завершился ошибкой"
            exit 1
          fi
          if [ "${rc}" -eq 2 ]; then
            echo "Plan содержит изменения — будут применены на apply."
          else
            echo "Plan чист — apply ничего не изменит."
          fi

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Read outputs
        id: tfout
        run: |
          set -euo pipefail
          IP=$(terraform output -raw public_ip)
          ID=$(terraform output -raw instance_id)
          echo "public_ip=${IP}" >> "${GITHUB_OUTPUT}"
          echo "instance_id=${ID}" >> "${GITHUB_OUTPUT}"

      - name: Summary
        run: |
          {
            echo "## Prod host (Terraform)"
            echo
            echo "| Поле | Значение |"
            echo "| --- | --- |"
            echo "| Instance ID | ${{ steps.tfout.outputs.instance_id }} |"
            echo "| Public IP | ${{ steps.tfout.outputs.public_ip }} |"
            echo "| Plan exit code | ${{ steps.plan.outputs.exit_code }} (0=no-op, 2=changes) |"
            echo
            echo "### Секреты для deploy.yml"
            echo "| Secret | Значение |"
            echo "| --- | --- |"
            echo "| SSH_HOST | ${{ steps.tfout.outputs.public_ip }} |"
            echo "| SSH_USER | ubuntu |"
            echo "| SSH_PRIVATE_KEY | приватная половина ключа jsnotes_prod |"
            echo "| PROD_ENV_FILE | содержимое .env.prod |"
            echo
            echo "Сайт: http://${{ steps.tfout.outputs.public_ip }}/"
            echo "Health: http://${{ steps.tfout.outputs.public_ip }}/api/v1/health"
          } >> "${GITHUB_STEP_SUMMARY}"
