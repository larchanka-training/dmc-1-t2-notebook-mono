name: Preview — orphan sweep

# Safety net for preview-v2 (decision C): per-PR slices are created/destroyed by
# the ui/api repos' preview.yml on PR open/close. If a teardown is missed (failed
# run, force-deleted branch), this sweep removes the orphans:
#   - ECS services preview-pr-<N> (+ their target group + ALB rule) whose API-repo
#     PR #<N> is no longer open
#   - S3 prefixes /pr-<N>/ whose UI-repo PR #<N> is no longer open
# Note: ui and api PR numbers are SEPARATE namespaces, so S3 is checked against
# the ui repo and ECS against the api repo.

on:
  schedule:
    - cron: "17 3 * * *" # daily, 03:17 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  # Names derive from PREVIEW_PROJECT (= preview stack's Terraform var.project),
  # so a rename only needs vars.PREVIEW_PROJECT set, not edits here.
  PREVIEW_CLUSTER: ${{ vars.PREVIEW_PROJECT || 'jsnotes-t2-preview' }}
  PREVIEW_BUCKET: ${{ vars.PREVIEW_PROJECT || 'jsnotes-t2-preview' }}-frontend
  ALB_NAME: ${{ vars.PREVIEW_PROJECT || 'jsnotes-t2-preview' }}-alb
  CLOUDFRONT_COMMENT: ${{ vars.PREVIEW_PROJECT || 'jsnotes-t2-preview' }} frontend
  UI_REPO: "larchanka-training/dmc-1-t2-notebook-ui"
  API_REPO: "larchanka-training/dmc-1-t2-notebook-api"
  # Anomaly guard: a healthy sweep removes 0–1 orphans. More than this in a
  # single run signals a bad open-PR list (e.g. a transient gh failure) — abort
  # rather than mass-delete live previews.
  MAX_DELETES: "3"

jobs:
  sweep:
    name: Sweep orphaned previews
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sweep ECS per-PR backends (vs api repo open PRs)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          # Fail CLOSED: if the open-PR list can't be fetched (rate-limit, network
          # blip, expired GH_PAT), abort — do NOT treat it as "0 open PRs" and
          # delete every live preview. No `|| echo ""`; require a valid JSON array.
          OPEN_JSON=$(gh pr list --repo "${API_REPO}" --state open --limit 200 --json number)
          echo "${OPEN_JSON}" | jq -e 'type == "array"' >/dev/null
          OPEN=$(echo "${OPEN_JSON}" | jq -r '.[].number')
          echo "Open api PRs: ${OPEN:-none}"

          ALB_ARN=$(aws elbv2 describe-load-balancers --names "${ALB_NAME}" --query 'LoadBalancers[0].LoadBalancerArn' --output text)
          LISTENER=$(aws elbv2 describe-listeners --load-balancer-arn "${ALB_ARN}" --query "Listeners[?Port==\`80\`].ListenerArn | [0]" --output text)

          deletes=0
          for ARN in $(aws ecs list-services --cluster "${PREVIEW_CLUSTER}" --query 'serviceArns[]' --output text); do
            NAME="${ARN##*/}"
            case "${NAME}" in preview-pr-*) ;; *) continue;; esac
            N="${NAME#preview-pr-}"
            if echo "${OPEN}" | grep -qx "${N}"; then
              echo "keep ${NAME} (api PR #${N} open)"; continue
            fi
            deletes=$((deletes + 1))
            if [ "${deletes}" -gt "${MAX_DELETES}" ]; then
              echo "::error::More than ${MAX_DELETES} orphan ECS services in one run — aborting before mass-delete (suspect a bad open-PR list)."
              exit 1
            fi
            echo "::warning::orphan ${NAME} (api PR #${N} not open) — removing"
            aws ecs delete-service --cluster "${PREVIEW_CLUSTER}" --service "${NAME}" --force >/dev/null || true
            RULE=$(aws elbv2 describe-rules --listener-arn "${LISTENER}" \
              --query "Rules[?Conditions[?Field=='path-pattern' && contains(Values, '/pr-${N}/api/v1/*')]].RuleArn | [0]" --output text 2>/dev/null || true)
            [ -n "${RULE}" ] && [ "${RULE}" != "None" ] && aws elbv2 delete-rule --rule-arn "${RULE}" || true
            TG=$(aws elbv2 describe-target-groups --names "preview-pr-${N}-tg" --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)
            [ -n "${TG}" ] && [ "${TG}" != "None" ] && aws elbv2 delete-target-group --target-group-arn "${TG}" || true
          done

      - name: Sweep S3 per-PR frontends (vs ui repo open PRs)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail
          # Fail CLOSED (see the ECS step): abort on a failed open-PR fetch rather
          # than wiping every live /pr-<N>/ frontend.
          OPEN_JSON=$(gh pr list --repo "${UI_REPO}" --state open --limit 200 --json number)
          echo "${OPEN_JSON}" | jq -e 'type == "array"' >/dev/null
          OPEN=$(echo "${OPEN_JSON}" | jq -r '.[].number')
          echo "Open ui PRs: ${OPEN:-none}"

          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${CLOUDFRONT_COMMENT}'].Id | [0]" --output text)

          deletes=0
          for PREFIX in $(aws s3api list-objects-v2 --bucket "${PREVIEW_BUCKET}" --delimiter / \
              --query 'CommonPrefixes[].Prefix' --output text); do
            case "${PREFIX}" in pr-*/) ;; *) continue;; esac
            N="${PREFIX#pr-}"; N="${N%/}"
            if echo "${OPEN}" | grep -qx "${N}"; then
              echo "keep /${PREFIX} (ui PR #${N} open)"; continue
            fi
            deletes=$((deletes + 1))
            if [ "${deletes}" -gt "${MAX_DELETES}" ]; then
              echo "::error::More than ${MAX_DELETES} orphan S3 prefixes in one run — aborting before mass-delete (suspect a bad open-PR list)."
              exit 1
            fi
            echo "::warning::orphan /${PREFIX} (ui PR #${N} not open) — removing"
            aws s3 rm "s3://${PREVIEW_BUCKET}/${PREFIX}" --recursive >/dev/null || true
            [ -n "${DIST_ID}" ] && [ "${DIST_ID}" != "None" ] && \
              aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/${PREFIX}*" >/dev/null || true
          done
