name: Deploy

# Деплой прод-окружения из образов в Amazon ECR.
#
# Два режима запуска:
#   - АВТО: после успешного "ECR Publish" на main → деплой тега latest
#     (это и есть "автодеплой при merge в main").
#   - РУЧНОЙ (workflow_dispatch): выбрать тег — в т.ч. ОТКАТ на старый
#     immutable sha (например sha-8be47cc).
#
# Два режима ВЫКАТА (выбирается автоматически по наличию секретов):
#   - РЕАЛЬНЫЙ SSH-деплой — если заданы SSH_HOST/SSH_USER/SSH_PRIVATE_KEY и
#     PROD_ENV_FILE: заходит на прод-хост, логинится в ECR, docker compose pull
#     + up -d, smoke-check. Хост создаётся один раз через infra-prod.yml.
#   - DRY-RUN — если секретов нет: только валидирует тег и compose, на сервер
#     не ходит. (Так было исходно; остаётся как безопасный дефолт.)
# Подробно: docs/deploy.md.

on:
  workflow_run:
    workflows: ["ECR Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR-тег без префикса api-/ui- (напр. latest или sha-8be47cc). Для отката — старый sha."
        required: true
        type: string
        default: latest

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production
    # Авто (workflow_run) — только если сборка успешна; ручной и push (тест на ветке) — всегда.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    # В проекте пока только production (staging нет). Чтобы добавить staging —
    # вернуть input environment и подставлять его сюда и в DEPLOY_ENVIRONMENT.
    environment: production
    env:
      DEPLOY_ENVIRONMENT: production
      # Авто (после merge) → latest. Ручной → выбранный тег (в т.ч. откат на старый sha).
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      ECR_REGISTRY: 867633231218.dkr.ecr.eu-north-1.amazonaws.com
      ECR_REPOSITORY: jsnotes-t2
      SSH_HOST_CONFIGURED: ${{ secrets.SSH_HOST != '' }}
      SSH_USER_CONFIGURED: ${{ secrets.SSH_USER != '' }}
      SSH_PRIVATE_KEY_CONFIGURED: ${{ secrets.SSH_PRIVATE_KEY != '' }}
      PROD_ENV_CONFIGURED: ${{ secrets.PROD_ENV_FILE != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Show deploy trigger
        run: |
          set -euo pipefail
          echo "Event:       ${{ github.event_name }}"
          echo "Environment: ${DEPLOY_ENVIRONMENT}"
          echo "Image tag:   ${IMAGE_TAG}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Triggered by ECR Publish: ${{ github.event.workflow_run.html_url }}"
            echo "Head SHA: ${{ github.event.workflow_run.head_sha }}"
          fi

      - name: Decide deploy mode
        id: mode
        run: |
          set -euo pipefail
          if [ "${SSH_HOST_CONFIGURED}" = "true" ] \
             && [ "${SSH_USER_CONFIGURED}" = "true" ] \
             && [ "${SSH_PRIVATE_KEY_CONFIGURED}" = "true" ] \
             && [ "${PROD_ENV_CONFIGURED}" = "true" ]; then
            echo "Режим: РЕАЛЬНЫЙ SSH-деплой"
            echo "real=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Режим: DRY-RUN (нет полного набора секретов SSH_*/PROD_ENV_FILE)"
            echo "real=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate image tag
        run: |
          set -euo pipefail
          if [ -z "${IMAGE_TAG}" ]; then
            echo "image_tag must not be empty" >&2
            exit 1
          fi
          if ! printf '%s' "${IMAGE_TAG}" | grep -Eq '^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$'; then
            echo "Invalid image_tag: ${IMAGE_TAG}" >&2
            echo "Use a Docker tag like latest, v1.2.3, or sha-8be47cc." >&2
            exit 1
          fi

      - name: Prepare env for compose validation
        run: |
          set -euo pipefail
          cp .env.prod.example .env.prod
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env.prod

      - name: Validate Docker Compose config
        run: docker compose --env-file .env.prod -f docker-compose.prod.yaml config >/dev/null

      # ───────────────────────── РЕАЛЬНЫЙ ДЕПЛОЙ ─────────────────────────
      - name: Configure AWS credentials
        if: steps.mode.outputs.real == 'true'
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build real .env.prod from secret
        if: steps.mode.outputs.real == 'true'
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail
          printf '%s\n' "${PROD_ENV_FILE}" > .env.prod.real
          # Тег и реестр всегда задаём из workflow (override того, что в секрете).
          if grep -q '^IMAGE_TAG=' .env.prod.real; then
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env.prod.real
          else
            echo "IMAGE_TAG=${IMAGE_TAG}" >> .env.prod.real
          fi
          if grep -q '^ECR_REGISTRY=' .env.prod.real; then
            sed -i "s#^ECR_REGISTRY=.*#ECR_REGISTRY=${ECR_REGISTRY}#" .env.prod.real
          else
            echo "ECR_REGISTRY=${ECR_REGISTRY}" >> .env.prod.real
          fi
          # Санити: compose должен валидироваться и с реальным env.
          docker compose --env-file .env.prod.real -f docker-compose.prod.yaml config >/dev/null

      - name: Set up SSH
        if: steps.mode.outputs.real == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy compose files to host
        if: steps.mode.outputs.real == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          $SSH "${SSH_USER}@${SSH_HOST}" 'mkdir -p ~/app/proxy'
          $SCP docker-compose.prod.yaml "${SSH_USER}@${SSH_HOST}:~/app/docker-compose.prod.yaml"
          $SCP proxy/nginx.prod.conf "${SSH_USER}@${SSH_HOST}:~/app/proxy/nginx.prod.conf"
          $SCP .env.prod.real "${SSH_USER}@${SSH_HOST}:~/app/.env.prod"

      - name: Deploy on host (ECR login → pull → up)
        if: steps.mode.outputs.real == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          # ECR-токен берём на раннере (тут есть AWS-креды) и отдаём в docker login
          # на хосте через stdin — на диск хоста токен не пишем.
          TOKEN=$(aws ecr get-login-password --region "${AWS_REGION}")
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          printf '%s' "${TOKEN}" | $SSH "${SSH_USER}@${SSH_HOST}" \
            "docker login --username AWS --password-stdin ${ECR_REGISTRY} \
             && cd ~/app \
             && docker compose --env-file .env.prod -f docker-compose.prod.yaml pull \
             && docker compose --env-file .env.prod -f docker-compose.prod.yaml up -d --remove-orphans \
             && docker image prune -f"

      - name: Smoke check
        if: steps.mode.outputs.real == 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          ok=""
          for i in $(seq 1 10); do
            if curl -fsS "http://${SSH_HOST}/api/v1/health" >/dev/null 2>&1; then
              ok="yes"; break
            fi
            echo "health не готов (попытка ${i}/10), жду..."
            sleep 6
          done
          if [ -z "${ok}" ]; then
            echo "::error::smoke-check не прошёл: http://${SSH_HOST}/api/v1/health недоступен" >&2
            exit 1
          fi
          echo "Smoke OK: http://${SSH_HOST}/api/v1/health"

      # ───────────────────────────── SUMMARY ─────────────────────────────
      - name: Write deployment summary
        if: always()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          if [ "${{ steps.mode.outputs.real }}" = "true" ]; then
            MODE="РЕАЛЬНЫЙ SSH-деплой"
            URL="http://${SSH_HOST}/"
          else
            MODE="DRY-RUN (на сервер не ходили)"
            URL="— (нет секретов SSH_*/PROD_ENV_FILE)"
          fi
          {
            echo "## Deploy — ${MODE}"
            echo
            echo "| Поле | Значение |"
            echo "| --- | --- |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Environment | ${DEPLOY_ENVIRONMENT} |"
            echo "| Image tag | ${IMAGE_TAG} |"
            echo "| API image | ${ECR_REGISTRY}/${ECR_REPOSITORY}:api-${IMAGE_TAG} |"
            echo "| UI image | ${ECR_REGISTRY}/${ECR_REPOSITORY}:ui-${IMAGE_TAG} |"
            echo "| URL | ${URL} |"
            echo
            echo "### Секреты деплоя"
            echo
            echo "| Secret | Configured |"
            echo "| --- | --- |"
            echo "| SSH_HOST | ${SSH_HOST_CONFIGURED} |"
            echo "| SSH_USER | ${SSH_USER_CONFIGURED} |"
            echo "| SSH_PRIVATE_KEY | ${SSH_PRIVATE_KEY_CONFIGURED} |"
            echo "| PROD_ENV_FILE | ${PROD_ENV_CONFIGURED} |"
            if [ "${{ steps.mode.outputs.real }}" != "true" ]; then
              echo
              echo "> Чтобы включить реальный деплой: создай хост (workflow «Infra — Provision prod host»)"
              echo "> и добавь секреты SSH_HOST/SSH_USER/SSH_PRIVATE_KEY/PROD_ENV_FILE в окружение production."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
